<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clinic Queue — History</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏥</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="receptionist.css" />
  <style>
    .history-card { padding: 24px; }
    .history-controls { display: flex; gap: 12px; margin-bottom: 24px; align-items: center; flex-wrap: wrap; }
    .export-section { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; margin-bottom: 16px; }
    .export-section-title { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
    .export-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .export-btn-green  { background: #dcfce7; color: #15803d; border: 1px solid #86efac; padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .export-btn-green:hover { background: #bbf7d0; }
    .export-btn-purple { background: #ede9fe; color: #6d28d9; border: 1px solid #c4b5fd; padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .export-btn-purple:hover { background: #ddd6fe; }
    .export-label { font-size: 12px; color: var(--text-muted); font-weight: 600; white-space: nowrap; }
    .history-kpi { grid-template-columns: 1fr 1fr 1fr !important; }
    @media (max-width: 600px) {
      .history-card { padding: 14px; }
      .history-kpi { grid-template-columns: 1fr !important; }
      .export-section { padding: 12px; margin: 10px 10px 0; }
      .export-row { flex-direction: column; align-items: flex-start; }
      #export-from, #export-to { width: 100%; }
      .export-label { margin-top: 4px; }
    }
  </style>
</head>
<body>

  <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
  <aside class="sidebar">
    <div class="sidebar-logo" onclick="window.location.href='receptionist.html'" style="cursor:pointer;">
      <div class="sl-icon">🏥</div>
      <div><div class="sl-name">ClinicQ</div><div class="sl-role">History Panel</div></div>
    </div>
    <nav class="sidebar-nav">
      <a href="receptionist.html" class="snav-item" id="nav-dash">
        <span class="snav-icon">◱</span> Dashboard
      </a>
      <a href="history.html" class="snav-item active" id="nav-history">
        <span class="snav-icon">◴</span> History
      </a>
      <a href="patients.html" class="snav-item" id="nav-patients">
        <span class="snav-icon">👥</span> Patients
      </a>
      <a href="#" onclick="showQRModal()" class="snav-item" id="nav-qr">
        <span class="snav-icon">🔲</span> Patient's View QR Code
      </a>
      <a href="/" class="snav-item"><span class="snav-icon">🏠</span> Back to Home</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sf-conn">
        <div class="sf-dot" id="sf-dot"></div>
        <span class="sf-conn-text" id="sf-text">Connecting…</span>
      </div>
      <div class="sf-time" id="sf-time">--:--:--</div>
    </div>
  </aside>

  <div class="main-wrap">
    <header class="topbar">
      <div class="topbar-title">
        <button id="sidebar-toggle" style="background:none; border:none; cursor:pointer; font-size:20px; color:var(--text);">&#9776;</button>
        Consultation History
        <span class="topbar-date" id="topbar-date"></span>
      </div>
      <div class="topbar-right">
        <div class="topbar-api">
          <div class="topbar-api-dot"></div>
          Server Online
        </div>
      </div>
    </header>
    
    <div class="main-content" style="grid-template-columns: 1fr;">
      <div class="card history-card">
        <div class="qc-header" style="padding:14px 18px 12px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px;">
          <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
            <input type="date" id="history-date" class="form-input" style="padding:5px 8px;width:auto;font-size:12px;" />
            <button class="btn" style="background:#e0f2fe;color:#0284c7;border:1px solid #7dd3fc;padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;" onclick="sendDailyReport()">📧 Email Report</button>
          </div>
          <input id="history-search" type="text" placeholder="🔍 Search name or token…" oninput="filterHistory()" class="queue-search" style="width:210px;" />
        </div>

        <!-- Export Range Section -->
        <div class="export-section" style="margin:14px 18px 0;">
          <div class="export-section-title">📤 Export Custom Date Range</div>
          <div class="export-row">
            <span class="export-label">From:</span>
            <input type="datetime-local" id="export-from" class="form-input" style="padding:4px 8px;width:auto;font-size:12px;" />
            <span class="export-label">To:</span>
            <input type="datetime-local" id="export-to" class="form-input" style="padding:4px 8px;width:auto;font-size:12px;" />
            <button class="export-btn-green" onclick="exportRange()">📤 Export Range</button>
            <button class="export-btn-purple" onclick="appendMasterLog()">📋 Append to Master Log</button>
          </div>
        </div>
        
        <div class="kpi-strip history-kpi" style="margin-bottom: 0; border-bottom: 1px solid var(--border); border-radius: 0; box-shadow: none;">
          <div class="kpi-card" style="box-shadow:none;border:none;">
            <div class="kpi-icon green">✅</div>
            <div class="kpi-body"><div class="kpi-val green" id="h-kpi-total">0</div><div class="kpi-label">Total Served</div></div>
          </div>
          <div class="kpi-card" style="box-shadow:none;border:none;">
            <div class="kpi-icon purple">⏱</div>
            <div class="kpi-body"><div class="kpi-val purple" id="h-kpi-avg">—</div><div class="kpi-label">Avg Duration</div></div>
          </div>
          <div class="kpi-card" style="box-shadow:none;border:none;">
            <div class="kpi-icon amber">📈</div>
            <div class="kpi-body"><div class="kpi-val amber" id="h-kpi-peak">—</div><div class="kpi-label">Peak Hour</div></div>
          </div>
        </div>

        <div class="queue-table-wrap">
          <table class="queue-table">
            <thead>
              <tr>
                <th class="sortable-th" onclick="sortHistory('token')" style="cursor:pointer;">Token <span id="sort-h-token" class="sort-arrow"></span></th>
                <th class="sortable-th" onclick="sortHistory('name')" style="cursor:pointer;">Patient <span id="sort-h-name" class="sort-arrow"></span></th>
                <th class="sortable-th" onclick="sortHistory('checkInTime')" style="cursor:pointer;">Arrival <span id="sort-h-arr" class="sort-arrow"></span></th>
                <th class="sortable-th" onclick="sortHistory('consultEndTime')" style="cursor:pointer;">Departure <span id="sort-h-dep" class="sort-arrow"></span></th>
                <th class="sortable-th" onclick="sortHistory('elapsedMs')" style="cursor:pointer;">Duration <span id="sort-h-dur" class="sort-arrow"></span></th>
              </tr>
            </thead>
            <tbody id="history-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script>
    if (!document.cookie.includes('rcp_auth=')) window.location.replace('/?signin=1');
    function signOut() { document.cookie = 'rcp_auth=; Max-Age=0; path=/;'; window.location.href = '/'; }
  </script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="history.js"></script>
</body>
</html>
