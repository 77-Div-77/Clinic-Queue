<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clinic Queue — Patients Directory</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏥</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="receptionist.css" />
  <script src="/theme.js"></script>
  <style>
    .patients-card { padding: 24px; }
    @media (max-width: 600px) {
      .patients-card { padding: 14px; }
      #patients-search { width: 100% !important; margin-top: 8px; }
    }
  </style>
</head>
<body>

  <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
  <aside class="sidebar">
    <div class="sidebar-logo" onclick="window.location.href='receptionist.html'" style="cursor:pointer;">
      <div class="sl-icon">🏥</div>
      <div><div class="sl-name">ClinicQ</div><div class="sl-role">Patients Panel</div></div>
    </div>
    <nav class="sidebar-nav">
      <a href="receptionist.html" class="snav-item" id="nav-dash">
        <span class="snav-icon">◱</span> Dashboard
      </a>
      <a href="history.html" class="snav-item" id="nav-history">
        <span class="snav-icon">◴</span> History
      </a>
      <a href="patients.html" class="snav-item active" id="nav-patients">
        <span class="snav-icon">👥</span> Patients
      </a>
      <a href="#" onclick="showQRModal()" class="snav-item" id="nav-qr">
        <span class="snav-icon">🔲</span> Patient's View QR Code
      </a>
      <a href="/" class="snav-item"><span class="snav-icon">🏠</span> Back to Home</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sf-conn">
        <div class="sf-dot" id="sf-dot"></div>
        <span class="sf-conn-text" id="sf-text">Connecting…</span>
      </div>
      <div class="sf-time" id="sf-time">--:--:--</div>
    </div>
  </aside>

  <div class="main-wrap">
    <header class="topbar">
      <div class="topbar-title">
        <button id="sidebar-toggle" style="background:none; border:none; cursor:pointer; font-size:20px; color:var(--text);">&#9776;</button>
        Patients Directory
        <span class="topbar-date" id="topbar-date"></span>
      </div>
      <div class="topbar-right" style="display:flex; align-items:center;">
        <button class="theme-toggle-btn" title="Toggle Theme" style="margin-right: 12px; font-size: 18px;"></button>
        <div class="topbar-api">
          <div class="topbar-api-dot"></div>
          Server Online
        </div>
      </div>
    </header>
    
    <div class="main-content" style="grid-template-columns: 1fr;">
      <div class="card patients-card">
        <div class="qc-header" style="padding:14px 18px 12px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;">
          <div>
            <div id="patients-count" style="font-size:12px;font-weight:700;color:var(--blue);">Loading…</div>
          </div>
          <input id="patients-search" type="text" placeholder="🔍 Search name, phone or ID…" oninput="filterPatients()" class="queue-search" style="min-width:160px; flex:1; max-width:260px;" />
        </div>
        <div class="queue-table-wrap">
          <table class="queue-table">
            <thead>
              <tr>
                <th class="sortable-th" onclick="sortPatients('id')" style="cursor:pointer;">Patient ID <span id="sort-pid" class="sort-arrow"></span></th>
                <th class="sortable-th" onclick="sortPatients('name')" style="cursor:pointer;">Name <span id="sort-name" class="sort-arrow"></span></th>
                <th>Phone Number</th>
                <th class="sortable-th" onclick="sortPatients('totalMeetings')" style="cursor:pointer;">Total Meetings <span id="sort-meetings" class="sort-arrow"></span></th>
              </tr>
            </thead>
            <tbody id="patients-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script>
    if (!document.cookie.includes('rcp_auth=')) window.location.replace('/?signin=1');
    function signOut() { document.cookie = 'rcp_auth=; Max-Age=0; path=/;'; window.location.href = '/'; }
  </script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="patients.js"></script>
</body>
</html>
